name: 🧪 Benchmark QuickJS4J with Hyperfine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🧰 Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: 📦 Install Hyperfine
        run: sudo apt-get install -y hyperfine

      - name: 🛠️ Build quickjs4j-benchmark
        working-directory: quickjs4j-benchmark
        run: mvn clean package -DskipTests

      - name: 🚀 Run Hyperfine benchmark
        run: |
          hyperfine 'java -jar quickjs4j-benchmark/target/quickjs4j-benchmark.jar'
