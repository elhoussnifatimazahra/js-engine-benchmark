name: Build and Benchmark QuickJS4J

on:
  push:
    paths:
      - 'quickjs4j-benchmark/**'
      - '.github/workflows/hyperfine.yml'
  pull_request:
    paths:
      - 'quickjs4j-benchmark/**'
      - '.github/workflows/hyperfine.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Java 24
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 24

    - name: Build quickjs4j-benchmark module with Maven
      run: mvn clean package -DskipTests -f quickjs4j-benchmark/pom.xml

    - name: Install hyperfine
      run: |
        sudo apt-get update
        sudo apt-get install -y hyperfine

    - name: Run hyperfine benchmark on jar
      run: hyperfine 'java -jar quickjs4j-benchmark/target/quickjs4j-benchmark.jar'
