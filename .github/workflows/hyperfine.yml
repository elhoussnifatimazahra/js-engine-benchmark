name: Build, Run and Benchmark quickjs4j

on:
  push:
    paths:
      - 'quickjs4j-benchmark/**'
  pull_request:
    paths:
      - 'quickjs4j-benchmark/**'
  workflow_dispatch:

jobs:
  build-run-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 24
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 24

      - name: Build with Maven
        working-directory: quickjs4j-benchmark
        run: mvn clean package -DskipTests
        
      - name: List files in target
        working-directory: quickjs4j-benchmark
        run: ls -l target/
              
      - name: Run the Java app once (check output)
        working-directory: quickjs4j-benchmark
        run: java -jar target/quickjs4j-benchmark-1.0-SNAPSHOT.jar

      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Run hyperfine benchmark
        working-directory: quickjs4j-benchmark
        run: hyperfine --show-output 'java -jar target/quickjs4j-benchmark-1.0-SNAPSHOT.jar'
