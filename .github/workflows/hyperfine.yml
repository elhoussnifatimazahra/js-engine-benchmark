name: QuickJS4J Build and Benchmark

on:
  push:
    paths:
      - 'quickjs4j-benchmark/**'
      - '.github/workflows/quickjs4j-benchmark.yml'
  pull_request:
    paths:
      - 'quickjs4j-benchmark/**'
      - '.github/workflows/quickjs4j-benchmark.yml'
  workflow_dispatch:

jobs:
  build-and-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 24
        uses: actions/setup-java@v3
        with:
          java-version: 24
          distribution: temurin

      - name: Build quickjs4j-benchmark project
        working-directory: quickjs4j-benchmark
        run: mvn clean package -DskipTests

      - name: Install hyperfine (benchmark tool)
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Run hyperfine benchmark
        working-directory: quickjs4j-benchmark
        run: hyperfine --show-output 'java -jar target/quickjs4j-benchmark.jar'
