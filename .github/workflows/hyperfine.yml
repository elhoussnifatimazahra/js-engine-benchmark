name: Hyperfine Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: ⚙️ Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: 🛠️ Build project with Maven
        run: mvn clean package -DskipTests

      - name: 🧰 Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: 🚀 Run hyperfine
        run: hyperfine 'java -jar target/quickjs4j-benchmark.jar'
