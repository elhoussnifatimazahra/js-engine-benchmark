name: Build, Run and Benchmark quickjs4j and graaljs

on:
  push:
    paths:
      - 'quickjs4j-benchmark/**'
      - 'graaljs-benchmark/**'
  pull_request:
    paths:
      - 'quickjs4j-benchmark/**'
      - 'graaljs-benchmark/**'
  workflow_dispatch:

jobs:
  build-run-benchmark:
    name: Benchmark on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 24
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 24

      # Build quickjs4j
      - name: Build quickjs4j-benchmark with Maven
        working-directory: quickjs4j-benchmark
        run: mvn clean package -DskipTests

      # Build graaljs
      - name: Build graaljs-benchmark with Maven
        working-directory: graaljs-benchmark
        run: mvn clean package -DskipTests


      # Install hyperfine for benchmarking (Linux + macOS)
      - name: Install hyperfine
        if: matrix.os != 'windows-latest'
        run: |
          sudo apt-get update || brew update
          sudo apt-get install -y hyperfine || brew install hyperfine

      # Install hyperfine on Windows
      - name: Install hyperfine on Windows
        if: matrix.os == 'windows-latest'
        run: choco install hyperfine

      # Benchmark quickjs4j
      - name: Benchmark quickjs4j-benchmark with hyperfine
        working-directory: quickjs4j-benchmark
        run: hyperfine --show-output 'java -jar target/quickjs4j-benchmark-1.0-SNAPSHOT.jar'

    
      - name: Generate quickjs4j trace file (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          # Use `xcrun xctrace` to profile the quickjs4j benchmark and save the output.
          echo "Generating trace file for quickjs4j..."
          # L'option `--launch` est ajoutée ici pour indiquer à xctrace de lancer la commande qui suit.
          xcrun xctrace record --template 'Time Profile' --output './quickjs4j-benchmark.trace' --launch -- java -jar quickjs4j-benchmark/target/quickjs4j-benchmark-1.0-SNAPSHOT.jar
              
      - name: Upload quickjs4j trace file as artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: quickjs4j-trace-macos
          path: quickjs4j-benchmark.trace
          retention-days: 7
